<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tus fuentes originales -->
    <link href="https://fonts.cdnfonts.com/css/exima-geometric" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/poterski-hnd-ce" rel="stylesheet">
    <link rel="stylesheet" href="estilopelicula.css">
    <title>Document JOHANA MICHEL SALAZAR MARTINEZ</title>
</head>

<body>

    <div class="container">
        <h1>Pagina de peliculas</h1>
        <h3>JOHANA MICHEL SALAZAR MARTINEZ</h3>
    </div>

    <form id="form">
        <input type="text" id="search" placeholder="Spiderman No Way Home">
        <input type="submit" value="Buscar">
    </form>

    <section id="main" class="movies"></section>

<script>

    // URL de películas populares
    const API_URL = 'https://api.themoviedb.org/3/discover/movie?sort_by=popularity.desc&api_key=3fd2be6f0c70a2a598f084ddfb75487c&page=1';
    // URL de imágenes
    const IMG_PATH = 'https://image.tmdb.org/t/p/w1280';
    // URL para buscar películas
    const SEARCH_API = 'https://api.themoviedb.org/3/search/movie?api_key=3fd2be6f0c70a2a598f084ddfb75487c&query=';
    const main = document.getElementById('main');
    const form = document.getElementById('form');
    const search = document.getElementById('search');

    getMovie(API_URL);

    async function getMovie(url){

        const res = await fetch(url);

        const data = await res.json();

        showMovies(data.results);
    }

    function showMovies(movies){

        main.innerHTML = '';

        movies.forEach((movie) => {

            const {
                title,
                poster_path,
                vote_average,
                overview,
                release_date
            } = movie;

            const movieEl = document.createElement('div');

            movieEl.classList.add('movie');

            movieEl.innerHTML = `
            
            <img src="${IMG_PATH + poster_path}" alt="${title}">

            <div class="movie-info">

                <h3>${title}</h3>

                <span class="${getClassByRate(vote_average)}">
                    ${vote_average}
                </span>

            </div>

            <div class="overview">

                <h3>Overview</h3>

                ${overview}

                <h3>Release Date</h3>

                ${release_date}

            </div>

            `;

            main.appendChild(movieEl);

        });

    }

    function getClassByRate(vote){

        if(vote >= 8){

            return 'green';

        }else if(vote >= 5){

            return 'orange';

        }else{

            return 'red';

        }

    }

    form.addEventListener('submit',(e)=>{

        e.preventDefault();

        const searchTerm = search.value;

        if(searchTerm && searchTerm !== ''){

            getMovie(SEARCH_API + searchTerm);

            search.value = '';

        }else{

            window.location.reload();

        }

    });

</script>

</body>
</html>
