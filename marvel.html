<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro Marvel</title>

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap.min.css">

<style>

body{
    background:#76e4a8;
}

.form-container{
    width:80%;
    max-width:700px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:15px;
}

h1{
    text-align:center;
}

.btn-marvel{
    background:#A31E21;
    color:white;
    border:none;
    padding:10px 20px;
}

</style>
</head>

<body>

<div class="form-container">

<h1>REGISTRO DE HÉROES MARVEL</h1>

<form>

<div class="form-group">
<label>Nombre del Héroe</label>
<input type="text" class="form-control">
</div>

<div class="form-group">
<label>Nombre Real</label>
<input type="text" class="form-control">
</div>

<div class="form-group">
<label>Poderes</label>
<input type="text" class="form-control">
</div>

<div class="form-group">
<label>Altura</label>
<input type="text" class="form-control">
</div>

<div class="form-group">
<label>Biografía</label>
<textarea class="form-control"></textarea>
</div>

<div class="form-group">
<label>Fotografía</label>
<input type="file" class="form-control">
</div>

<div class="text-center">
<button type="button" class="btn-marvel">
REGISTRAR HÉROE
</button>
</div>

</form>

</div>

</body>
</html>
